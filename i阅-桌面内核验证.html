<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>i阅 · 桌面内核验证</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 40px;
      background: radial-gradient(circle at 30% 20%, rgba(200,140,80,.16), transparent 40%), #000;
      color: rgba(255,244,224,.92);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.7;
    }
    main { max-width: 920px; margin: 0 auto; }
    h1 { font-weight: 240; letter-spacing: .12em; margin: 0 0 6px; }
    .sub { color: rgba(255,235,205,.55); font-size: 14px; margin: 0 0 28px; }
    .card { border: 1px solid rgba(255,230,190,.14); border-radius: 18px; background: rgba(16,12,8,.6); padding: 20px 22px; margin-bottom: 18px; }
    .card h2 { font-size: 15px; font-weight: 360; letter-spacing: .08em; color: rgba(255,226,180,.8); margin: 0 0 14px; }
    label { display: block; font-size: 12px; color: rgba(255,235,205,.5); margin: 10px 0 4px; }
    input, textarea, select {
      width: 100%; background: rgba(0,0,0,.4); border: 1px solid rgba(255,230,190,.18);
      color: inherit; border-radius: 10px; padding: 10px 12px; font: inherit; font-size: 14px;
    }
    textarea { min-height: 70px; resize: vertical; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 160px; }
    button {
      margin-top: 14px; background: rgba(244,172,86,.16); border: 1px solid rgba(255,226,180,.34);
      color: rgba(255,240,215,.95); border-radius: 999px; padding: 10px 18px; font: inherit; cursor: pointer;
      transition: background .2s ease;
    }
    button:hover { background: rgba(244,172,86,.28); }
    button.ghost { background: transparent; }
    pre {
      white-space: pre-wrap; word-break: break-word; font-size: 12.5px; line-height: 1.6;
      background: rgba(0,0,0,.45); border: 1px solid rgba(255,230,190,.1); border-radius: 12px;
      padding: 14px; color: rgba(255,239,216,.82); max-height: 320px; overflow: auto;
    }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid rgba(255,230,190,.2); margin: 0 6px 6px 0; }
    .ok { color: #9be29b; } .no { color: #e2b09b; }
    .note { font-size: 12px; color: rgba(255,235,205,.45); }
  </style>
</head>
<body>
  <main>
    <h1>i阅 · 桌面内核验证</h1>
    <p class="sub">本页无任何构建步骤，直接 <code>import</code> 网页端同一个 <code>web/lib/core.mjs</code>。<br/>存储用浏览器 localStorage（本地化），大脑用共享内核——同一个 i阅，两种身体。</p>

    <div class="card">
      <h2>1 · 抛一句给 i阅（沉淀进本地记忆）</h2>
      <div class="row">
        <div style="flex:1.2"><label>书名</label><input id="book" value="穷查理宝典" /></div>
        <div style="flex:.8"><label>模式</label>
          <select id="mode"><option value="fireplace">炉边智者</option><option value="desk">书桌笔记</option><option value="starmap">思维星图</option></select>
        </div>
      </div>
      <label>读到的触动 / 疑问</label>
      <textarea id="msg">第三章讲到能力圈，我突然意识到自己很多判断其实在圈外</textarea>
      <button id="send">沉淀这一轮</button>
      <button id="reset" class="ghost">清空本地记忆</button>
    </div>

    <div class="card">
      <h2>2 · 本地记忆现状（来自 localStorage）</h2>
      <div id="status"></div>
      <pre id="mem"></pre>
    </div>

    <div class="card">
      <h2>3 · 共享大脑产出的 System Prompt</h2>
      <pre id="prompt"></pre>
    </div>

    <div class="card">
      <h2>4 · 人格进化（梦境整理）</h2>
      <div id="consolidateStatus"></div>
      <label>DeepSeek API Key（可选，填了就跑真实进化；留空只展示将发给模型的请求）</label>
      <input id="key" placeholder="sk-... 留空也能看构造出的进化 Prompt" />
      <button id="consolidate">运行夜间整理</button>
      <pre id="consolidateOut"></pre>
    </div>
  </main>

  <script type="module">
    import {
      MODES, defaultMemory, normalizeMemory, captureTurn, recordConversation,
      buildSystemPrompt, shouldConsolidate, buildConsolidationMessages, applyConsolidation
    } from "./web/lib/core.mjs";

    // 桌面端的存储适配层：本地、私密。网页端这一层换成 Supabase 即可，大脑不变。
    const KEY = "iyue_desktop_memory_v1";
    const load = () => normalizeMemory(JSON.parse(localStorage.getItem(KEY) || "null"));
    const save = (m) => localStorage.setItem(KEY, JSON.stringify(m));

    const $ = (id) => document.getElementById(id);
    function render() {
      const m = load();
      $("mem").textContent = JSON.stringify(m, null, 2);
      const p = m.reader_profile;
      $("status").innerHTML =
        `<span class="pill">对话 ${m.conversations.length}</span>` +
        `<span class="pill">笔记 ${m.reading_notes.length}</span>` +
        `<span class="pill">思想节点 ${m.thought_nodes.length}</span>` +
        `<span class="pill">梦境洞察 ${m.dream_notes.length}</span>` +
        (p.currentChapter ? `<span class="pill">${p.currentChapter}</span>` : "");
      $("prompt").textContent = buildSystemPrompt(m, $("book").value || "未命名", $("mode").value);
      const ready = shouldConsolidate(m);
      $("consolidateStatus").innerHTML = ready
        ? `<span class="ok">✓ 满足进化条件（距上次 &gt;24h 且新对话 ≥ 2）</span>`
        : `<span class="no">○ 还不满足（需要 &gt;24h 间隔 + ≥2 条新对话）。下方按钮会忽略时间限制强制演示。</span>`;
    }

    $("send").onclick = () => {
      const book = $("book").value.trim(), mode = $("mode").value, text = $("msg").value.trim();
      if (!book || !text) return;
      let m = load();
      m = captureTurn(m, { book, mode, userText: text, assistantText: "反过来想：你最近哪个判断其实在能力圈外？" });
      m = recordConversation(m, { book, mode, messages: [
        { role: "user", content: text },
        { role: "assistant", content: "反过来想：你最近哪个判断其实在能力圈外？" }
      ]});
      save(m); render();
    };
    $("reset").onclick = () => { localStorage.removeItem(KEY); render(); };

    $("consolidate").onclick = async () => {
      const m = load();
      const messages = buildConsolidationMessages(m);
      const key = $("key").value.trim();
      if (!key) {
        $("consolidateOut").textContent =
          "未填 Key，仅展示将发送给 DeepSeek 的请求（网页端由 /api/consolidate 在服务端完成）：\n\n" +
          JSON.stringify(messages, null, 2);
        return;
      }
      $("consolidateOut").textContent = "正在请求 DeepSeek...";
      try {
        const r = await fetch("https://api.deepseek.com/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${key}` },
          body: JSON.stringify({ model: "deepseek-reasoner", messages, temperature: 0.4, max_tokens: 700 })
        });
        const data = await r.json();
        const raw = data.choices?.[0]?.message?.content || "";
        const evolved = applyConsolidation(m, raw);
        save(evolved); render();
        $("consolidateOut").textContent =
          "模型原始返回：\n" + raw +
          "\n\n—— 写回本地记忆后 ——\npersonality_notes:\n" + evolved.reader_profile.personality_notes +
          "\n\n最新梦境洞察:\n" + (evolved.dream_notes.slice(-1)[0]?.content || "");
      } catch (e) {
        $("consolidateOut").textContent = "请求失败：" + (e?.message || e);
      }
    };

    render();
  </script>
</body>
</html>
