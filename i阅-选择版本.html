<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>i阅 · 选择版本</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: rgba(255, 244, 224, 0.92);
      background:
        radial-gradient(circle at 30% 24%, rgba(188, 116, 46, 0.24), transparent 34%),
        radial-gradient(circle at 72% 72%, rgba(82, 118, 210, 0.16), transparent 32%),
        #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(1120px, calc(100vw - 56px));
    }

    h1 {
      margin: 0 0 12px;
      font-weight: 230;
      font-size: 38px;
      letter-spacing: .18em;
    }

    p {
      margin: 0 0 36px;
      color: rgba(255, 235, 205, 0.58);
      font-size: 15px;
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    a {
      min-height: 330px;
      padding: 28px;
      border: 1px solid rgba(255, 230, 190, 0.14);
      border-radius: 28px;
      color: inherit;
      text-decoration: none;
      background: rgba(16, 12, 8, 0.64);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
      overflow: hidden;
      position: relative;
    }

    a:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 226, 180, 0.34);
      background: rgba(28, 20, 12, 0.76);
    }

    .orb {
      position: absolute;
      right: -60px;
      bottom: -70px;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      filter: blur(10px);
      opacity: .8;
    }

    .fire .orb { background: radial-gradient(circle, rgba(244, 172, 86, .42), transparent 68%); }
    .desk .orb { background: radial-gradient(circle, rgba(255, 218, 150, .34), transparent 68%); }
    .star .orb { background: radial-gradient(circle, rgba(120, 165, 255, .38), transparent 68%); }

    h2 {
      position: relative;
      margin: 0 0 18px;
      font-size: 26px;
      font-weight: 280;
    }

    .tag {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
      padding: 7px 11px;
      border: 1px solid rgba(255, 230, 190, 0.15);
      border-radius: 999px;
      color: rgba(255, 230, 198, 0.58);
      font-size: 12px;
    }

    .desc {
      position: relative;
      color: rgba(255, 239, 216, 0.74);
      font-size: 15px;
      line-height: 1.85;
    }

    .enter {
      position: absolute;
      left: 28px;
      bottom: 26px;
      color: rgba(255, 235, 205, 0.44);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      body { overflow: auto; padding: 32px 0; }
      .grid { grid-template-columns: 1fr; }
      a { min-height: 260px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>i阅</h1>
    <p>同一个阅读 Agent，三种陪伴形态。今天想怎么读，就从哪里进入。</p>
    <section class="grid">
      <a class="fire" href="i阅.html?mode=fireplace">
        <div class="orb"></div>
        <h2>炉边智者</h2>
        <div class="tag">安静陪读 · 情绪价值</div>
        <div class="desc">像一位长者坐在旁边，少说废话，多问好问题。适合晚上、慢读、读到有触动时聊两句。</div>
        <div class="enter">进入这个版本</div>
      </a>
      <a class="desk" href="i阅.html?mode=desk">
        <div class="orb"></div>
        <h2>书桌笔记</h2>
        <div class="tag">白天阅读 · 自动沉淀</div>
        <div class="desc">一边聊，一边把章节、问题、金句和洞察留在右侧。适合真正积累阅读资产。</div>
        <div class="enter">进入这个版本</div>
      </a>
      <a class="star" href="i阅.html?mode=starmap">
        <div class="orb"></div>
        <h2>思维星图</h2>
        <div class="tag">跨书连接 · 长期进化</div>
        <div class="desc">每次对话都点亮一个思想节点，慢慢形成你的个人阅读宇宙和跨书关联。</div>
        <div class="enter">进入这个版本</div>
      </a>
    </section>
  </main>
</body>
</html>
